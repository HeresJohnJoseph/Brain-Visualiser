<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Headroom — What's on your mind</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,500&family=Hanken+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
<style>
  html,body{height:100%;margin:0;background:#03060f;}
  *{-webkit-font-smoothing:antialiased;box-sizing:border-box;}
  :root{
    --sans:"Hanken Grotesk",ui-sans-serif,system-ui,sans-serif;
    --serif:"Fraunces",Georgia,serif; --mono:"Space Mono",ui-monospace,monospace;
    --ink:#e8eeff; --ink-dim:rgba(214,226,248,0.6); --ink-faint:rgba(214,226,248,0.4);
    --ember-1:#ffd2a0; --ember-2:#ff854a; --ember-3:#ff5a22; --ember-glow:rgba(255,120,45,.5);
  }
  body{font-family:var(--sans);color:var(--ink);}
  input,textarea,button{font-family:inherit;}
  ::placeholder{color:rgba(214,226,248,0.35);}
  .bv-scroll::-webkit-scrollbar{width:8px;}
  .bv-scroll::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.12);border-radius:8px;}

  .outer{display:flex;flex-direction:row;width:100%;height:100vh;background:#03060f;}
  .brain{position:relative;flex:1 1 auto;width:100%;height:100%;overflow:hidden;}
  .brain canvas{display:block;width:100%;height:100%;}

  .title{position:absolute;left:18px;top:16px;pointer-events:none;}
  .title .k{font-family:var(--mono);font-size:11px;letter-spacing:2.5px;text-transform:uppercase;color:rgba(214,226,248,0.5);}
  .title .h{font-family:var(--serif);font-size:20px;font-weight:500;color:#fff;margin-top:3px;}

  .nav{position:absolute;right:18px;top:16px;display:flex;gap:6px;background:rgba(6,12,26,0.55);
    border:1px solid rgba(255,255,255,0.09);padding:5px;border-radius:12px;backdrop-filter:blur(10px);z-index:7;}
  .nav a{padding:7px 13px;border-radius:8px;font-size:12.5px;font-weight:600;color:var(--ink-dim);text-decoration:none;transition:.2s;}
  .nav a:hover{color:#fff;}
  .nav a.on{background:linear-gradient(135deg,rgba(255,133,74,.24),rgba(255,90,34,.16));color:#fff;}

  .hint{position:absolute;left:18px;bottom:16px;display:flex;align-items:center;gap:8px;
    padding:7px 12px;border-radius:999px;background:rgba(6,12,26,0.5);backdrop-filter:blur(8px);
    border:1px solid rgba(255,255,255,0.08);pointer-events:none;}
  .hint .d{width:6px;height:6px;border-radius:50%;background:#ff5a3c;box-shadow:0 0 8px #ff5a3c;}
  .hint .t{font-size:11.5px;letter-spacing:0.3px;color:rgba(214,226,248,0.7);}

  /* selected card */
  .card{position:absolute;width:290px;max-height:74vh;overflow-y:auto;padding:14px;border-radius:14px;
    background:rgba(8,14,28,0.94);backdrop-filter:blur(18px);border:1px solid rgba(255,255,255,0.12);
    box-shadow:0 20px 60px rgba(0,0,0,0.65);z-index:6;}
  .card .row{display:flex;align-items:center;gap:8px;margin-bottom:9px;}
  .card .dot{width:9px;height:9px;border-radius:50%;}
  .card .lab{font-family:var(--mono);font-size:12px;letter-spacing:1.5px;text-transform:uppercase;font-weight:700;}
  .card .x{margin-left:auto;width:24px;height:24px;display:grid;place-items:center;border:none;border-radius:6px;
    background:rgba(255,255,255,0.06);color:rgba(255,255,255,0.6);font-size:16px;line-height:1;cursor:pointer;}
  .card textarea{width:100%;resize:none;border:1px solid rgba(255,255,255,0.1);background:rgba(0,0,0,0.25);
    border-radius:9px;color:#fff;font-size:16px;line-height:1.5;padding:11px 12px;outline:none;}
  .card .acts{display:flex;align-items:center;gap:8px;margin-top:10px;}
  .card .done{flex:1;padding:10px 12px;border-radius:8px;font-size:14px;font-weight:650;cursor:pointer;}
  .card .del{padding:10px 12px;border-radius:8px;border:1px solid rgba(255,90,60,0.35);background:rgba(255,90,60,0.08);
    color:#ff8c75;font-size:14px;font-weight:600;cursor:pointer;}
  .card .clearbtn{width:100%;margin-top:10px;padding:12px;border-radius:10px;border:none;cursor:pointer;
    font-weight:650;font-size:14.5px;color:#3a1c08;background:linear-gradient(135deg,var(--ember-1),var(--ember-2));
    box-shadow:0 6px 18px var(--ember-glow);display:flex;align-items:center;justify-content:center;gap:7px;transition:.2s;}
  .card .clearbtn:hover{filter:brightness(1.07);}
  .card .moods{margin-top:11px;padding-top:11px;border-top:1px solid rgba(255,255,255,0.09);
    display:flex;flex-direction:column;gap:8px;}
  .card .mrow{display:flex;align-items:center;justify-content:space-between;gap:8px;}
  .card .mrow .ml{font-size:13.5px;color:rgba(214,226,248,0.7);display:flex;align-items:center;gap:5px;}
  .card .mrow .dots{display:flex;gap:5px;}
  .card .mrow .dt{width:18px;height:18px;border-radius:50%;border:1px solid rgba(255,255,255,0.18);
    background:rgba(255,255,255,0.04);cursor:pointer;padding:0;transition:.12s;}
  .card .mrow .dt:hover{transform:scale(1.15);}
  .ai{margin-top:12px;border-top:1px solid rgba(255,255,255,0.1);padding-top:12px;}
  .ai .kick{font-family:var(--mono);font-size:11px;letter-spacing:1.4px;text-transform:uppercase;color:var(--ember-1);margin-bottom:8px;}
  .ai .head{font-family:var(--serif);font-style:italic;font-size:17px;line-height:1.4;color:#fff;margin-bottom:10px;}
  .ai .act{display:flex;gap:10px;padding:9px 0;border-top:1px solid rgba(255,255,255,0.07);}
  .ai .act:first-of-type{border-top:none;}
  .ai .act .n{font-family:var(--mono);font-size:12px;color:var(--ember-1);padding-top:2px;flex:none;}
  .ai .act .tt{font-weight:650;font-size:14.5px;}
  .ai .act .dd{font-size:13.5px;color:var(--ink-dim);line-height:1.5;margin-top:2px;}
  .ai .calm{margin-top:10px;background:rgba(255,150,70,.08);border:1px solid rgba(255,150,70,.2);border-radius:10px;
    padding:10px 12px;font-family:var(--serif);font-style:italic;font-size:14.5px;line-height:1.5;color:#ffdfbc;}
  .skel{height:11px;border-radius:6px;margin:8px 0;background:linear-gradient(90deg,rgba(255,255,255,.05),rgba(255,255,255,.13),rgba(255,255,255,.05));background-size:200% 100%;animation:sheen 1.3s linear infinite;}
  @keyframes sheen{to{background-position:-200% 0}}

  /* panel */
  .panel{flex:none;width:380px;height:100%;display:flex;flex-direction:column;
    background:rgba(7,12,24,0.92);border-left:1px solid rgba(255,255,255,0.08);backdrop-filter:blur(10px);}
  .phead{padding:20px 20px 14px;border-bottom:1px solid rgba(255,255,255,0.07);}
  .phead .top{display:flex;align-items:baseline;justify-content:space-between;}
  .phead .top .t{font-size:16px;font-weight:650;color:#fff;}
  .phead .top .c{font-size:13px;color:rgba(214,226,248,0.5);}
  .load{margin-top:12px;}
  .load .lr{display:flex;justify-content:space-between;font-size:12.5px;color:rgba(214,226,248,0.55);margin-bottom:6px;}
  .load .bar{height:7px;border-radius:99px;background:rgba(255,255,255,0.07);overflow:hidden;}
  .load .bar i{display:block;height:100%;border-radius:99px;transition:width .4s ease,background .4s ease;}
  .planbtn{width:100%;margin-top:13px;padding:11px;border-radius:10px;border:1px solid rgba(255,170,110,.3);cursor:pointer;
    background:rgba(255,133,74,.1);color:var(--ember-1);font-weight:650;font-size:14px;display:flex;align-items:center;
    justify-content:center;gap:7px;transition:.2s;}
  .planbtn:hover{background:rgba(255,133,74,.18);}
  .tipsbox{margin-top:12px;padding:12px 14px;border-radius:12px;background:rgba(255,150,70,.07);
    border:1px solid rgba(255,150,70,.18);}
  .tipsbox .tk{font-size:12.5px;font-weight:650;margin-bottom:7px;}
  .tipsbox .ti{font-size:13px;line-height:1.5;color:var(--ink-dim);margin-top:6px;padding-top:6px;
    border-top:1px solid rgba(255,255,255,0.06);}
  .tipsbox .ti:first-of-type{border-top:none;padding-top:0;margin-top:0;}

  .cap{padding:16px 20px;border-bottom:1px solid rgba(255,255,255,0.07);}
  .cap input{width:100%;border:1px solid rgba(255,255,255,0.12);background:rgba(0,0,0,0.25);border-radius:10px;
    color:#fff;font-size:16px;padding:13px 14px;outline:none;transition:border-color .2s;}
  .cap input:focus{border-color:rgba(255,170,110,0.5);}
  .segrow{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap;}
  .prow{display:flex;align-items:center;gap:8px;margin-top:10px;flex-wrap:wrap;}
  .prow .pl{font-size:12.5px;color:rgba(214,226,248,0.5);}
  .seg{padding:8px 13px;border-radius:8px;font-size:13.5px;font-weight:600;cursor:pointer;white-space:nowrap;
    border:1px solid rgba(255,255,255,0.12);background:rgba(255,255,255,0.03);color:rgba(214,226,248,0.6);transition:.15s;}
  #dueInput{border:1px solid rgba(255,255,255,0.12);background:rgba(0,0,0,0.25);border-radius:8px;
    color:#fff;font-size:14px;padding:7px 10px;outline:none;color-scheme:dark;}
  .add{margin-left:auto;padding:10px 18px;border-radius:9px;border:none;
    background:linear-gradient(135deg,var(--ember-1),var(--ember-2));color:#3a1c08;font-size:14.5px;font-weight:700;cursor:pointer;
    box-shadow:0 6px 18px var(--ember-glow);}

  .filters{display:flex;gap:6px;padding:14px 20px 10px;flex-wrap:wrap;}
  .filters .seg{display:inline-flex;align-items:center;padding:7px 11px;}
  .filters .seg .n{margin-left:6px;font-size:11.5px;opacity:.7;font-weight:700;}

  .list{flex:1 1 auto;overflow-y:auto;padding:4px 12px 16px;min-height:0;}
  .item{display:flex;align-items:center;gap:10px;padding:11px 10px;border-radius:10px;cursor:pointer;margin-top:4px;
    border:1px solid transparent;transition:background .15s;}
  .item:hover{background:rgba(255,255,255,0.03);}
  .item .d{width:9px;height:9px;flex:none;border-radius:50%;}
  .item .mid{flex:1;min-width:0;}
  .item .tx{font-size:15px;line-height:1.4;color:#eef3ff;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .item .meta{font-size:12px;letter-spacing:0.3px;color:rgba(214,226,248,0.5);margin-top:3px;display:flex;align-items:center;gap:5px;}
  .item .clr{color:var(--ember-1);font-family:var(--mono);font-size:11px;}
  .item .ck{width:26px;height:26px;flex:none;border-radius:7px;cursor:pointer;font-size:13px;line-height:1;background:transparent;}
  .item .rm{width:26px;height:26px;flex:none;border:none;border-radius:7px;background:transparent;
    color:rgba(214,226,248,0.4);font-size:16px;line-height:1;cursor:pointer;transition:.15s;}
  .item .rm:hover{background:rgba(255,90,60,0.14);color:#ff8c75;}
  .empty{text-align:center;padding:40px 16px;color:rgba(214,226,248,0.5);font-size:14px;line-height:1.5;}

  /* plan modal */
  .modal{position:fixed;inset:0;z-index:20;display:none;align-items:center;justify-content:center;
    background:rgba(3,6,15,0.66);backdrop-filter:blur(4px);}
  .modal.open{display:flex;}
  .modal .box{width:min(460px,92vw);max-height:84vh;overflow-y:auto;background:linear-gradient(180deg,rgba(16,22,42,.97),rgba(9,12,26,.98));
    border:1px solid rgba(255,255,255,0.12);border-radius:18px;padding:26px;box-shadow:0 30px 80px rgba(0,0,0,.6);}
  .modal .mk{display:flex;justify-content:space-between;align-items:center;font-family:var(--mono);font-size:11.5px;
    letter-spacing:1.6px;text-transform:uppercase;color:var(--ember-1);}
  .modal .mx{cursor:pointer;background:none;border:none;color:var(--ink-faint);font-size:22px;line-height:1;}
  .modal .bq{font-family:var(--serif);font-style:italic;font-size:20px;line-height:1.4;color:#fff;margin:18px 0 6px;}
  .modal ol{list-style:none;padding:0;margin:16px 0;display:flex;flex-direction:column;gap:2px;}
  .modal li{display:flex;gap:13px;padding:13px 0;border-top:1px solid rgba(255,255,255,0.08);}
  .modal li .i{font-family:var(--mono);font-size:13px;color:var(--ember-1);padding-top:2px;}
  .modal li .tt{font-weight:650;font-size:15.5px;}
  .modal li .nn{font-size:14px;color:var(--ink-dim);line-height:1.5;margin-top:3px;}
  .modal .park{margin-top:8px;font-size:14px;color:#bff3e9;background:rgba(91,224,208,.08);
    border:1px solid rgba(91,224,208,.18);border-radius:12px;padding:12px 14px;}

  @media(max-width:880px){
    .outer{flex-direction:column;height:auto;min-height:100vh;}
    .brain{flex:none;height:56vh;min-height:360px;}
    .panel{width:100%;border-left:none;border-top:1px solid rgba(255,255,255,0.08);}
    .list{min-height:240px;}
  }
  .brain canvas#cv3d{position:absolute;inset:0;touch-action:none;cursor:grab;}
  .brain canvas#cv3d:active{cursor:grabbing;}
  .neurontip{position:absolute;pointer-events:none;transform:translate(-50%,-130%);
    background:rgba(6,12,26,0.88);border-radius:8px;padding:6px 10px;font-size:13px;font-weight:600;
    color:#fff;white-space:nowrap;box-shadow:0 8px 20px rgba(0,0,0,0.4);z-index:5;}
</style>
</head>
<body>
  <div class="outer">
    <div class="brain" id="stage">
      <canvas id="cv"></canvas>
      <canvas id="cv3d"></canvas>
      <div class="title"><div class="k">Headroom</div><div class="h">What's on your mind</div></div>
      <div class="nav"><a class="on" href="index.html">Brain dump</a><a href="dashboard.html">Overview</a><a href="connections.html">Connections</a></div>
      <div class="hint"><span class="d"></span><span class="t">Drag to rotate · click a neuron to read it · worries glow red-hot</span></div>
    </div>

    <aside class="panel">
      <div class="phead">
        <div class="top"><div class="t">Brain dump</div><div class="c"><span id="activeCount">0</span> active</div></div>
        <div class="load">
          <div class="lr"><span>Mental load</span><span id="loadLabel">Clear</span></div>
          <div class="bar"><i id="loadBar"></i></div>
        </div>
        <button class="planbtn" id="planBtn">✦ Plan my day</button>
        <div class="tipsbox" id="tipsBox" style="display:none"></div>
      </div>
      <div class="cap">
        <input id="draft" placeholder="Add a thought, then press Enter…" autocomplete="off"/>
        <div class="segrow" id="catRow"></div>
        <div class="prow" id="dueRow" style="display:none">
          <span class="pl">By</span>
          <input type="date" id="dueInput" />
        </div>
        <div class="prow">
          <span class="pl">Urgency</span>
          <div class="segrow" id="prioRow" style="margin-top:0"></div>
          <button class="add" id="addBtn">Add</button>
        </div>
      </div>
      <div class="filters" id="filters"></div>
      <div class="list bv-scroll" id="list"></div>
    </aside>
  </div>

  <div class="modal" id="planModal">
    <div class="box">
      <div class="mk"><span id="planKick">Headroom · planning your day</span><button class="mx" id="planClose">×</button></div>
      <div id="planBody"></div>
    </div>
  </div>

<script type="importmap">
{"imports":{
  "three":"https://unpkg.com/three@0.160.0/build/three.module.js",
  "three/addons/":"https://unpkg.com/three@0.160.0/examples/jsm/"
}}
</script>
<script type="module" src="brain3d.js"></script>
<script type="module">
(function(){
  "use strict";
  const $=s=>document.querySelector(s);

  const PAL={orange:{r:255,g:122,b:47},amber:{r:255,g:184,b:92},white:{r:232,g:238,b:255},blue:{r:122,g:172,b:255},red:{r:255,g:90,b:60}};
  const BOKEH_COLS=['orange','orange','amber','amber','white','blue'];
  const CATS={
    task:{label:'Task',hex:'#5b9dff',lobe:{x:0.37,y:0.42}},
    todo:{label:'To-do',hex:'#37d6ad',lobe:{x:0.52,y:0.33}},
    worry:{label:'Keeping me up',hex:'#ff5a3c',lobe:{x:0.49,y:0.59}},
    idea:{label:'Idea',hex:'#b98cff',lobe:{x:0.665,y:0.42}},
    goal:{label:'Goal',hex:'#ffcf6b',lobe:{x:0.30,y:0.66}},
  };
  const CAT_ORDER=['task','todo','worry','idea','goal'];
  const fmtDue=iso=>{if(!iso)return '';const d=new Date(iso+'T00:00:00');
    return d.toLocaleDateString(undefined,{month:'short',year:'numeric'});};
  const TIPS=[
    "Step away from the screen for five minutes — let your eyes and mind reset.",
    "Take five slow breaths: in for four counts, out for six.",
    "Go for a short walk, even just to the end of the hall and back.",
    "One hand on your chest, one on your stomach — just notice your breathing for a minute.",
    "Drink a glass of water and roll your shoulders a few times.",
    "Name three things you can see right now — it pulls your mind out of the spiral.",
  ];
  const ACCENT={r:255,g:122,b:47};
  const PULSE_SPEED=1, DENSITY=1;
  const LS='brainviz.thoughts.v1';

  let uid=0;
  const rnd=(a,b)=>a+Math.random()*(b-a);
  const rgba=(c,a)=>`rgba(${c.r},${c.g},${c.b},${a})`;
  const hexRgb=hex=>{const n=parseInt(hex.replace('#',''),16);return {r:(n>>16)&255,g:(n>>8)&255,b:n&255};};
  const newId=()=>'t'+Date.now().toString(36)+(uid++);
  const esc=s=>{const d=document.createElement('div');d.textContent=s||'';return d.innerHTML;};

  const state={thoughts:[],draft:'',cat:'worry',prio:2,filter:'all',selectedId:null};

  function pos(cat,dx,dy){const l=CATS[cat].lobe;return {x:l.x+dx,y:l.y+dy};}
  function seed(){
    const s=[
      ['task','Finish the Q3 board deck',3,0.01,-0.03],
      ['task','Reply to the investor email',2,-0.06,0.02],
      ['task',"Review Maya's pull request",1,0.05,0.05],
      ['todo','Book a dentist appointment',1,-0.05,0.0],
      ['todo','Renew the car insurance',2,0.05,0.04],
      ['worry','Will we make payroll next month?',3,0.0,-0.03],
      ['worry','Did I actually send that contract?',2,-0.07,0.04],
      ['worry',"Mom's test results on Friday",3,0.07,0.03],
      ['idea','Newsletter: building in public',2,0.0,-0.03],
      ['idea','Try a 4-day work week',1,-0.06,0.05],
      ['goal','Run a 5km',2,0.0,-0.02],
    ];
    return s.map(([cat,text,prio,dx,dy])=>{const p=pos(cat,dx,dy);
      const th={id:newId(),text,cat,prio,done:false,x:p.x,y:p.y,t:Date.now()};
      if(cat==='goal')th.due='2026-11-01';
      return th;});
  }
  function persist(){try{localStorage.setItem(LS,JSON.stringify(state.thoughts));}catch(e){}}
  (function boot(){let t=null;try{const raw=localStorage.getItem(LS);if(raw)t=JSON.parse(raw);}catch(e){}
    state.thoughts=(t&&Array.isArray(t)&&t.length)?t:seed();})();

  /* ---------- 2D backdrop (bokeh / stars / ambient network) ---------- */
  const stage=$('#stage'), canvas=$('#cv'), ctx=canvas.getContext('2d');
  const dpr=Math.min(window.devicePixelRatio||1,2);
  let W=1,H=1, t0=performance.now(), scene=null;
  let hovered=null, lastPos={}, ripples=[];

  function buildScene(){
    const d=DENSITY, bokeh=[];
    for(let i=0;i<Math.round(15*d);i++)bokeh.push({x:Math.random(),y:Math.random(),r:rnd(0.04,0.16),
      col:PAL[BOKEH_COLS[Math.floor(Math.random()*BOKEH_COLS.length)]],ph:rnd(0,6.28),tw:rnd(0.15,0.5),
      vx:rnd(-0.012,0.012),vy:rnd(-0.01,0.01),depth:rnd(0.3,1)});
    const stars=[];
    for(let i=0;i<Math.round(100*d);i++)stars.push({x:Math.random(),y:Math.random(),r:rnd(0.4,1.6),ph:rnd(0,6.28),
      tw:rnd(0.6,1.6),col:Math.random()<0.7?PAL.white:(Math.random()<0.6?PAL.orange:PAL.amber),depth:rnd(0.6,1.4)});
    scene={bokeh,stars};
  }
  function resize(){const w=stage.clientWidth||1,h=stage.clientHeight||1;W=w;H=h;
    canvas.width=Math.round(w*dpr);canvas.height=Math.round(h*dpr);ctx.setTransform(dpr,0,0,dpr,0,0);}

  function loop(now){
    const tm=(now-t0)/1000, minD=Math.min(W,H), sc=scene;
    if(!sc){requestAnimationFrame(loop);return;}
    ctx.clearRect(0,0,W,H);
    ctx.fillStyle='#03060f';ctx.fillRect(0,0,W,H);
    ctx.globalCompositeOperation='lighter';
    for(const b of sc.bokeh){
      const tw=0.6+0.4*Math.sin(tm*b.tw+b.ph);
      const bx=(((b.x+b.vx*tm)%1+1)%1)*W, by=(((b.y+b.vy*tm)%1+1)%1)*H;
      const rr=b.r*minD*(0.85+0.15*tw);
      const g=ctx.createRadialGradient(bx,by,0,bx,by,rr);
      g.addColorStop(0,rgba(b.col,0.32*tw*b.depth));g.addColorStop(0.45,rgba(b.col,0.09*tw*b.depth));g.addColorStop(1,rgba(b.col,0));
      ctx.fillStyle=g;ctx.beginPath();ctx.arc(bx,by,rr,0,6.2832);ctx.fill();
    }
    for(const st of sc.stars){
      const tw=0.4+0.6*Math.abs(Math.sin(tm*st.tw+st.ph));
      const sx=st.x*W,sy=st.y*H;
      ctx.fillStyle=rgba(st.col,0.75*tw);ctx.beginPath();ctx.arc(sx,sy,st.r,0,6.2832);ctx.fill();
    }
    ctx.globalCompositeOperation='source-over';
    const vg=ctx.createRadialGradient(W/2,H/2,minD*0.25,W/2,H/2,minD*0.85);
    vg.addColorStop(0,'rgba(3,6,15,0)');vg.addColorStop(1,'rgba(2,4,11,0.6)');
    ctx.fillStyle=vg;ctx.fillRect(0,0,W,H);
    requestAnimationFrame(loop);
  }

  /* ---------- real 3D brain ---------- */
  const brain3D=HeadroomBrain3D.createBrainScene($('#cv3d'),{});
  const tip=document.createElement('div');tip.className='neurontip';tip.style.display='none';
  stage.appendChild(tip);

  function neuronSpecs(){
    const selId=state.selectedId;
    return state.thoughts.map(th=>{
      const isW=th.cat==='worry'&&!th.done;
      return {id:th.id,nx:th.x,ny:th.y,color:CATS[th.cat].hex,
        radius:0.034+th.prio*0.013,pulseSpeed:isW?2.6:1.5,phase:th.x*17,
        dim:th.done, highlight:hovered===th.id||selId===th.id};
    });
  }
  function updateNeurons(){brain3D.setNeurons(neuronSpecs());}

  brain3D.on('hover',id=>{hovered=id;updateNeurons();
    if(id){const t=state.thoughts.find(x=>x.id===id);const p=brain3D.screenPos(id);
      if(t&&p&&!p.behind){tip.style.display='block';tip.style.left=p.x+'px';tip.style.top=p.y+'px';
        let txt=t.text;if(txt.length>38)txt=txt.slice(0,37)+'…';tip.textContent=txt;}
      else tip.style.display='none';
    } else tip.style.display='none';
  });
  brain3D.on('click',id=>{
    if(id)select(id);
    else if(state.selectedId!==null){state.selectedId=null;brain3D.setIdle(true);renderCard();renderList();}
  });

  /* ---------- actions ---------- */
  const MOODS=[{key:'joy',label:'Joy',hex:'#ffce54'},{key:'stress',label:'Stress',hex:'#ff5a3c'},{key:'excitement',label:'Excitement',hex:'#37d6ad'}];
  function addThought(){const text=state.draft.trim();if(!text)return;
    const p=pos(state.cat,rnd(-0.06,0.06),rnd(-0.05,0.05));
    const due=(state.cat==='goal'&&$('#dueInput').value)?$('#dueInput').value:null;
    state.thoughts.push({id:newId(),text,cat:state.cat,prio:state.prio,done:false,x:p.x,y:p.y,t:Date.now(),due,mood:{joy:0,stress:0,excitement:0}});
    state.draft='';$('#draft').value='';$('#dueInput').value='';persist();renderAll();}
  function setMood(id,key,val){const th=state.thoughts.find(t=>t.id===id);if(!th)return;
    if(!th.mood)th.mood={joy:0,stress:0,excitement:0};
    th.mood[key]=th.mood[key]===val?0:val;persist();renderCard();}
  function setDue(id,due){const th=state.thoughts.find(t=>t.id===id);if(th){th.due=due||null;persist();renderCard();renderList();}}
  function toggleDone(id){const th=state.thoughts.find(t=>t.id===id);if(th){th.done=!th.done;persist();renderAll();}}
  function deleteThought(id){state.thoughts=state.thoughts.filter(t=>t.id!==id);
    if(state.selectedId===id)state.selectedId=null;persist();renderAll();}
  function editText(id,text){const th=state.thoughts.find(t=>t.id===id);if(th){th.text=text;th.ai=null;persist();renderList();}}
  function select(id){state.selectedId=id;brain3D.setIdle(false);updateNeurons();renderCard();renderList();}

  async function clearThought(th){
    const card=$('#stage .card');if(!card)return;
    const box=card.querySelector('.ai');
    box.innerHTML='<div class="kick">Headroom · clearing</div><div class="skel" style="width:88%"></div><div class="skel" style="width:66%"></div><div class="skel" style="width:78%"></div>';
    try{
      const r=await fetch('/api/clear',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({thought:th.text})});
      th.ai=await r.json();persist();
      if(state.selectedId===th.id)renderCard();renderList();
    }catch(e){box.innerHTML='<div class="kick">Headroom</div><div class="ai-err" style="font-size:12.5px;color:var(--ink-dim)">Couldn\'t reach the coach — is the server running?</div>';}
  }
  function aiHtml(ai){
    if(!ai)return '';
    const acts=(ai.actions||[]).map((a,i)=>'<div class="act"><div class="n">0'+(i+1)+'</div><div><div class="tt">'+esc(a.title)+'</div>'+(a.detail?'<div class="dd">'+esc(a.detail)+'</div>':'')+'</div></div>').join('');
    return '<div class="kick">Headroom · '+(ai.source==='mock'?'offline':'cleared')+'</div>'+
      (ai.headline?'<div class="head">'+esc(ai.headline)+'</div>':'')+acts+
      (ai.calm_note?'<div class="calm">'+esc(ai.calm_note)+'</div>':'');
  }

  /* ---------- plan my day ---------- */
  $('#planBtn').addEventListener('click',openPlan);
  $('#planClose').addEventListener('click',()=>$('#planModal').classList.remove('open'));
  $('#planModal').addEventListener('click',e=>{if(e.target.id==='planModal')$('#planModal').classList.remove('open');});
  async function openPlan(){
    const items=state.thoughts.filter(t=>!t.done).map(t=>({title:t.text,urgent:t.prio>=3||t.cat==='worry'}));
    const m=$('#planModal');m.classList.add('open');
    if(!items.length){$('#planBody').innerHTML='<div class="bq">Your mind is clear. Nothing to plan — enjoy it.</div>';return;}
    $('#planKick').textContent='Headroom · planning your day';
    $('#planBody').innerHTML='<div class="skel" style="width:92%;height:16px"></div><div class="skel" style="width:70%"></div><div class="skel" style="width:80%"></div>';
    try{
      const r=await fetch('/api/focus',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({items})});
      const d=await r.json();
      $('#planKick').textContent='Headroom · '+(d.source==='mock'?'offline':'your day');
      $('#planBody').innerHTML='<div class="bq">'+esc(d.brief||'')+'</div>'+
        '<ol>'+(d.focus||[]).map((f,i)=>'<li><span class="i">0'+(i+1)+'</span><span><span class="tt">'+esc(f.title)+'</span><div class="nn">'+esc(f.note||'')+'</div></span></li>').join('')+'</ol>'+
        (d.park?'<div class="park">🌙 '+esc(d.park)+'</div>':'');
    }catch(e){$('#planBody').innerHTML='<div class="bq">Couldn\'t reach the planner — is the server running?</div>';}
  }

  /* ---------- render panel ---------- */
  function segStyle(btn,active,hex){
    btn.style.border='1px solid '+(active?(hex||'rgba(255,170,110,0.6)'):'rgba(255,255,255,0.12)');
    btn.style.background=active?(hex?hex+'22':'rgba(255,133,74,0.16)'):'rgba(255,255,255,0.03)';
    btn.style.color=active?(hex||'#ffb782'):'rgba(214,226,248,0.6)';
  }
  function buildControls(){
    const catRow=$('#catRow');catRow.innerHTML='';
    CAT_ORDER.forEach(k=>{const b=document.createElement('button');b.className='seg';b.textContent=CATS[k].label;
      b.onclick=()=>{state.cat=k;paintControls();};catRow.appendChild(b);b._k=k;});
    const prioRow=$('#prioRow');prioRow.innerHTML='';
    [1,2,3].forEach(p=>{const b=document.createElement('button');b.className='seg';b.textContent='P'+p;
      b.onclick=()=>{state.prio=p;paintControls();};prioRow.appendChild(b);b._p=p;});
    const filters=$('#filters');filters.innerHTML='';
    [{key:'all',label:'All'},...CAT_ORDER.map(k=>({key:k,label:CATS[k].label}))].forEach(f=>{
      const b=document.createElement('button');b.className='seg';
      b.innerHTML=esc(f.label)+' <span class="n">0</span>';
      b.onclick=()=>{state.filter=f.key;renderAll();};filters.appendChild(b);b._f=f.key;});
  }
  function paintControls(){
    $('#catRow').querySelectorAll('.seg').forEach(b=>segStyle(b,state.cat===b._k,CATS[b._k].hex));
    $('#prioRow').querySelectorAll('.seg').forEach(b=>segStyle(b,state.prio===b._p,null));
    $('#dueRow').style.display=state.cat==='goal'?'flex':'none';
    const counts={all:state.thoughts.length};CAT_ORDER.forEach(k=>counts[k]=state.thoughts.filter(t=>t.cat===k).length);
    $('#filters').querySelectorAll('.seg').forEach(b=>{const hex=b._f==='all'?null:CATS[b._f].hex;
      segStyle(b,state.filter===b._f,hex);b.querySelector('.n').textContent=counts[b._f];});
  }
  function computeHot(){
    const scores={};CAT_ORDER.forEach(c=>scores[c]=0);
    for(const t of state.thoughts){if(t.done)continue;
      const s=t.prio+((t.mood&&t.mood.stress)?t.mood.stress*1.4:0)+(t.cat==='worry'?2:0);
      scores[t.cat]+=s;}
    let hotCat=null,hotScore=0;
    for(const c in scores){if(scores[c]>hotScore){hotScore=scores[c];hotCat=c;}}
    return {hotCat:hotScore>=6?hotCat:null,hotScore};
  }
  const tipPick=(()=>{const a=[...TIPS.keys()];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a.slice(0,2);})();
  function renderTips(){
    const box=$('#tipsBox');const hot=computeHot();
    if(!hot.hotCat){box.style.display='none';return;}
    box.style.display='block';
    const hex=CATS[hot.hotCat].hex;
    box.innerHTML='<div class="tk" style="color:'+hex+'">✦ Your "'+CATS[hot.hotCat].label+'" thoughts are working overtime</div>'+
      tipPick.map(i=>'<div class="ti">'+esc(TIPS[i%TIPS.length])+'</div>').join('');
  }
  function renderHead(){
    const active=state.thoughts.filter(t=>!t.done);
    const loadV=active.reduce((a,t)=>a+t.prio,0);
    const loadPct=Math.min(loadV/22,1);
    const loadLabel=loadV===0?'Clear':loadV<7?'Light':loadV<14?'Busy':'Heavy';
    const loadHex=loadPct>0.65?'#ff5a3c':loadPct>0.4?'#ff9a3c':'#5b9dff';
    $('#activeCount').textContent=active.length;
    $('#loadLabel').textContent=loadLabel;
    const bar=$('#loadBar');bar.style.width=(loadPct*100)+'%';bar.style.background=loadHex;bar.style.boxShadow='0 0 10px '+loadHex;
    brain3D.setAura(loadPct);
    const hot=computeHot();
    if(hot.hotCat)brain3D.setHotspot(CATS[hot.hotCat].lobe.x,CATS[hot.hotCat].lobe.y,CATS[hot.hotCat].hex);
    else brain3D.setHotspot(null);
    updateNeurons();
    renderTips();
  }
  function renderList(){
    const order={worry:0,task:1,todo:2,idea:3,goal:4};
    const rows=state.thoughts.filter(t=>state.filter==='all'||t.cat===state.filter)
      .sort((a,b)=>(a.done-b.done)||(b.prio-a.prio)||(order[a.cat]-order[b.cat])||(b.t-a.t));
    const list=$('#list');list.innerHTML='';
    if(!rows.length){list.innerHTML='<div class="empty">Nothing here yet. Empty your head into the box above.</div>';return;}
    rows.forEach(t=>{const hex=CATS[t.cat].hex, sel=state.selectedId===t.id;
      const row=document.createElement('div');row.className='item';
      row.style.background=sel?'rgba(255,133,74,0.12)':'';row.style.borderColor=sel?'rgba(255,170,110,0.3)':'transparent';
      row.style.opacity=t.done?0.55:1;
      row.innerHTML=
        '<span class="d" style="background:'+hex+';box-shadow:'+(t.done?'none':'0 0 8px '+hex)+'"></span>'+
        '<div class="mid"><div class="tx" style="text-decoration:'+(t.done?'line-through':'none')+'">'+esc(t.text)+'</div>'+
        '<div class="meta">'+CATS[t.cat].label+(t.cat==='goal'&&t.due?' · by '+fmtDue(t.due):' · P'+t.prio)+(t.done?' · done':'')+(t.ai?' <span class="clr">✦ cleared</span>':'')+'</div></div>'+
        '<button class="ck" style="border:1px solid '+(t.done?hex:'rgba(255,255,255,0.18)')+';background:'+(t.done?hex+'22':'transparent')+';color:'+(t.done?hex:'rgba(214,226,248,0.5)')+'">'+(t.done?'✓':'○')+'</button>'+
        '<button class="rm">×</button>';
      row.onclick=()=>select(t.id);
      row.querySelector('.ck').onclick=e=>{e.stopPropagation();toggleDone(t.id);};
      row.querySelector('.rm').onclick=e=>{e.stopPropagation();deleteThought(t.id);};
      list.appendChild(row);
    });
  }
  function goalHtml(t){
    const hex=CATS.goal.hex;
    let countdown='';
    if(t.due){
      const days=Math.ceil((new Date(t.due+'T00:00:00')-new Date())/86400000);
      countdown=days>0?days+' days to go — by '+fmtDue(t.due)
        :(days===0?'Today\'s the day.':'Target date has passed.');
    }
    return '<div class="mrow" style="margin:10px 0 2px"><span class="ml">Target date</span>'+
      '<input type="date" class="goaldue" value="'+(t.due||'')+'" style="border:1px solid rgba(255,255,255,0.14);'+
      'background:rgba(0,0,0,0.25);color:#fff;border-radius:7px;padding:5px 8px;font-size:13px;color-scheme:dark;"/></div>'+
      (countdown?'<div style="font-size:13px;color:'+hex+';margin-bottom:4px">'+countdown+'</div>':'');
  }
  function moodHtml(t){
    const m=t.mood||{};
    return '<div class="moods">'+MOODS.map(md=>{
      const v=m[md.key]||0;
      const dots=[1,2,3,4,5].map(i=>'<button class="dt" data-k="'+md.key+'" data-v="'+i+'" style="'+
        (i<=v?'background:'+md.hex+';border-color:'+md.hex+';box-shadow:0 0 6px '+md.hex+'66':'')+'"></button>').join('');
      return '<div class="mrow"><span class="ml">'+md.label+'</span><span class="dots">'+dots+'</span></div>';
    }).join('')+'</div>';
  }
  function renderCard(){
    const old=$('#stage .card');if(old)old.remove();
    const t=state.thoughts.find(x=>x.id===state.selectedId);if(!t)return;
    const hex=CATS[t.cat].hex, p=brain3D.screenPos(t.id)||{x:W/2,y:H/2};
    const left=Math.max(12,Math.min((W||600)-314,p.x+18));
    const top=Math.max(12,Math.min(Math.max(12,(H||400)-360),p.y-30));
    const card=document.createElement('div');card.className='card';card.style.left=left+'px';card.style.top=top+'px';
    const clearLabel = t.cat==='worry' ? '✦ Help me set this down' : '✦ Help me clear this';
    card.innerHTML=
      '<div class="row"><span class="dot" style="background:'+hex+';box-shadow:0 0 10px '+hex+'"></span>'+
      '<span class="lab" style="color:'+hex+'">'+esc(CATS[t.cat].label)+'</span>'+
      '<button class="x">×</button></div>'+
      '<textarea rows="3">'+esc(t.text)+'</textarea>'+
      (t.cat==='goal'?goalHtml(t):'')+
      moodHtml(t)+
      '<div class="acts"><button class="done" style="border:1px solid '+hex+'66;background:'+hex+'22;color:'+hex+'">'+
      (t.done?'Mark active':'Mark done')+'</button>'+
      '<button class="del">Delete</button></div>'+
      (t.ai ? '<div class="ai">'+aiHtml(t.ai)+'</div>'
            : '<button class="clearbtn">'+clearLabel+'</button><div class="ai"></div>');
    card.querySelector('.x').onclick=()=>{state.selectedId=null;brain3D.setIdle(true);updateNeurons();renderCard();renderList();};
    card.querySelector('textarea').oninput=e=>editText(t.id,e.target.value);
    card.querySelector('.done').onclick=()=>toggleDone(t.id);
    card.querySelector('.del').onclick=()=>deleteThought(t.id);
    card.querySelectorAll('.dt').forEach(b=>{b.onclick=()=>setMood(t.id,b.dataset.k,+b.dataset.v);});
    const di=card.querySelector('.goaldue');if(di)di.onchange=e=>setDue(t.id,e.target.value);
    const cb=card.querySelector('.clearbtn');if(cb)cb.onclick=()=>clearThought(t);
    stage.appendChild(card);
  }
  function renderAll(){paintControls();renderHead();renderList();renderCard();}

  /* ---------- wire ---------- */
  $('#draft').addEventListener('input',e=>{state.draft=e.target.value;});
  $('#draft').addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();addThought();}});
  $('#addBtn').addEventListener('click',addThought);
  document.addEventListener('keydown',e=>{if(e.key==='Escape'){$('#planModal').classList.remove('open');if(state.selectedId){state.selectedId=null;renderCard();renderList();}}});

  buildControls();renderAll();
  buildScene();resize();
  new ResizeObserver(()=>{resize();renderCard();}).observe(stage);
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
