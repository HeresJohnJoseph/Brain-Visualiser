<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Headroom — Connections</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,500&family=Hanken+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
<style>
  html,body{height:100%;margin:0;background:#03060f;}
  *{-webkit-font-smoothing:antialiased;box-sizing:border-box;}
  :root{
    --sans:"Hanken Grotesk",ui-sans-serif,system-ui,sans-serif;
    --serif:"Fraunces",Georgia,serif; --mono:"Space Mono",ui-monospace,monospace;
    --ink:#e8eeff; --ink-dim:rgba(214,226,248,0.6); --ink-faint:rgba(214,226,248,0.4);
    --ember-1:#ffd2a0; --ember-2:#ff854a; --ember-3:#ff5a22; --ember-glow:rgba(255,120,45,.5);
  }
  body{font-family:var(--sans);color:var(--ink);}
  input,textarea,button{font-family:inherit;}
  .bv-scroll::-webkit-scrollbar{width:8px;}
  .bv-scroll::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.12);border-radius:8px;}

  .outer{display:flex;flex-direction:row;width:100%;height:100vh;background:#03060f;}
  .stage{position:relative;flex:1 1 auto;width:100%;height:100%;overflow:hidden;}
  .stage canvas{display:block;width:100%;height:100%;}

  .title{position:absolute;left:18px;top:16px;pointer-events:none;}
  .title .k{font-family:var(--mono);font-size:11px;letter-spacing:2.5px;text-transform:uppercase;color:rgba(214,226,248,0.5);}
  .title .h{font-family:var(--serif);font-size:20px;font-weight:500;color:#fff;margin-top:3px;}

  .nav{position:absolute;left:50%;top:16px;transform:translateX(-50%);display:flex;align-items:center;gap:3px;
    background:rgba(6,12,26,0.6);border:1px solid rgba(255,255,255,0.09);padding:6px;border-radius:999px;
    backdrop-filter:blur(14px);z-index:7;}
  .nav .logo{width:34px;height:34px;border-radius:50%;display:grid;place-items:center;flex:none;cursor:default;
    background:linear-gradient(90deg,#ffd2a0,#ff854a);transition:transform .2s;}
  .nav .logo:hover{transform:scale(1.1);}
  .nav .logo i{width:30px;height:30px;border-radius:50%;background:#060b18;display:grid;place-items:center;
    font-family:var(--serif);font-style:italic;font-size:14px;color:#fff;}
  .nav .ndiv{width:1px;height:20px;background:rgba(255,255,255,0.1);margin:0 5px;}
  .nav a{padding:8px 15px;border-radius:999px;font-size:12.5px;font-weight:600;color:var(--ink-dim);text-decoration:none;transition:.2s;}
  .nav a:hover{color:#fff;background:rgba(255,255,255,0.06);}
  .nav a.on{background:rgba(255,255,255,0.08);color:#fff;}

  .legend{position:absolute;left:18px;bottom:16px;display:flex;align-items:center;gap:14px;
    padding:9px 14px;border-radius:12px;background:rgba(6,12,26,0.55);backdrop-filter:blur(8px);
    border:1px solid rgba(255,255,255,0.08);z-index:7;}
  .legend .li{display:flex;align-items:center;gap:6px;font-size:11px;color:rgba(214,226,248,0.65);}
  .legend .d{width:8px;height:8px;border-radius:50%;}
  .legend .sep{width:1px;height:14px;background:rgba(255,255,255,0.12);}

  .card{position:absolute;width:280px;max-height:74vh;overflow-y:auto;padding:14px;border-radius:14px;
    background:rgba(8,14,28,0.94);backdrop-filter:blur(18px);border:1px solid rgba(255,255,255,0.12);
    box-shadow:0 20px 60px rgba(0,0,0,0.65);z-index:6;}
  .card .row{display:flex;align-items:center;gap:8px;margin-bottom:9px;}
  .card .dot{width:9px;height:9px;border-radius:50%;}
  .card .lab{font-family:var(--mono);font-size:10.5px;letter-spacing:1.5px;text-transform:uppercase;font-weight:700;}
  .card .x{margin-left:auto;width:22px;height:22px;display:grid;place-items:center;border:none;border-radius:6px;
    background:rgba(255,255,255,0.06);color:rgba(255,255,255,0.6);font-size:15px;line-height:1;cursor:pointer;}
  .card .tx{font-size:13.5px;line-height:1.45;color:#eef3ff;}
  .card .meta{margin-top:8px;font-size:11px;color:rgba(214,226,248,0.45);}
  .card .moods{margin-top:11px;padding-top:11px;border-top:1px solid rgba(255,255,255,0.09);
    display:flex;flex-direction:column;gap:7px;}
  .card .mrow{display:flex;align-items:center;justify-content:space-between;gap:8px;}
  .card .mrow .ml{font-size:11.5px;color:rgba(214,226,248,0.6);}
  .card .mrow .dots{display:flex;gap:4px;}
  .card .mrow .dt{width:15px;height:15px;border-radius:50%;border:1px solid rgba(255,255,255,0.18);
    background:rgba(255,255,255,0.04);cursor:pointer;padding:0;transition:.12s;}
  .card .mrow .dt:hover{transform:scale(1.15);}
  .card .link{margin-top:10px;font-size:11px;color:rgba(214,226,248,0.45);}

  .panel{flex:none;width:300px;height:100%;display:flex;flex-direction:column;
    background:rgba(7,12,24,0.92);border-left:1px solid rgba(255,255,255,0.08);backdrop-filter:blur(10px);}
  .phead{padding:20px 20px 16px;border-bottom:1px solid rgba(255,255,255,0.07);}
  .phead .t{font-size:15px;font-weight:650;color:#fff;}
  .phead .s{font-size:12px;color:rgba(214,226,248,0.5);margin-top:4px;line-height:1.4;}

  .sec{padding:16px 20px;border-bottom:1px solid rgba(255,255,255,0.07);}
  .sec .st{font-family:var(--mono);font-size:10px;letter-spacing:1.5px;text-transform:uppercase;
    color:rgba(214,226,248,0.45);margin-bottom:10px;}
  .chiprow{display:flex;gap:6px;flex-wrap:wrap;}
  .chip{padding:7px 11px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;
    border:1px solid rgba(255,255,255,0.09);background:rgba(255,255,255,0.02);color:rgba(214,226,248,0.55);
    display:inline-flex;align-items:center;gap:6px;transition:.15s;}
  .chip .d{width:8px;height:8px;border-radius:50%;}
  .chip.off{opacity:.4;}

  .modewrap{display:flex;gap:6px;flex-wrap:wrap;}
  .modewrap .modebtn{flex:1 1 30%;}
  .modebtn{flex:1;padding:8px;border-radius:8px;font-size:11.5px;font-weight:650;cursor:pointer;text-align:center;
    border:1px solid rgba(255,255,255,0.09);background:rgba(255,255,255,0.02);color:rgba(214,226,248,0.55);}
  .modebtn.on{border-color:rgba(255,170,110,.5);background:rgba(255,133,74,.16);color:#ffb782;}

  .stat{display:flex;justify-content:space-between;font-size:12.5px;padding:6px 0;color:rgba(214,226,248,0.7);}
  .stat b{color:#fff;}

  @media(max-width:880px){
    .outer{flex-direction:column;height:auto;min-height:100vh;}
    .stage{flex:none;height:56vh;min-height:360px;}
    .panel{width:100%;border-left:none;border-top:1px solid rgba(255,255,255,0.08);}
  }
</style>
</head>
<body>
  <div class="outer">
    <div class="stage" id="stage">
      <canvas id="cv"></canvas>
      <div class="title"><div class="k">Headroom</div><div class="h">How it connects</div></div>
      <div class="nav">
        <span class="logo"><i>H</i></span>
        <span class="ndiv"></span>
        <a href="index.html">Brain dump</a><a href="dashboard.html">Overview</a><a class="on" href="connections.html">Connections</a>
      </div>
      <div class="legend" id="legend"></div>
    </div>

    <aside class="panel">
      <div class="phead">
        <div class="t">Connections</div>
        <div class="s">Nothing in here lives alone. Every thought sits on the same brain and quietly touches the others — amber threads show the pull between categories, red threads show where stress is compounding.</div>
      </div>
      <div class="sec">
        <div class="st">Filter by category</div>
        <div class="chiprow" id="catChips"></div>
      </div>
      <div class="sec">
        <div class="st">Size / color by</div>
        <div class="modewrap" id="moodModes"></div>
      </div>
      <div class="sec" id="statsBox"></div>
    </aside>
  </div>

<script>
(function(){
  "use strict";
  const $=s=>document.querySelector(s);
  const LS='brainviz.thoughts.v1';
  const CATS={
    task:{label:'Task',hex:'#5b9dff',lobe:{x:0.37,y:0.42}},
    todo:{label:'To-do',hex:'#37d6ad',lobe:{x:0.52,y:0.33}},
    worry:{label:'Keeping me up',hex:'#ff5a3c',lobe:{x:0.49,y:0.59}},
    idea:{label:'Idea',hex:'#b98cff',lobe:{x:0.665,y:0.42}},
    goal:{label:'Goal',hex:'#ffcf6b',lobe:{x:0.30,y:0.66}},
  };
  const CAT_ORDER=['task','todo','worry','idea','goal'];
  const SIZES={s:{label:'S',r:5},m:{label:'M',r:8},l:{label:'L',r:12}};
  const SIZE_ORDER=['s','m','l'];
  const MOODS=[{key:'joy',label:'Joy',hex:'#ffce54'},{key:'stress',label:'Stress',hex:'#ff5a3c'},{key:'excitement',label:'Excitement',hex:'#37d6ad'}];
  const esc=s=>{const d=document.createElement('div');d.textContent=s||'';return d.innerHTML;};
  const hexRgb=hex=>{const n=parseInt(hex.replace('#',''),16);return {r:(n>>16)&255,g:(n>>8)&255,b:n&255};};
  const rgba=(c,a)=>`rgba(${c.r},${c.g},${c.b},${a})`;

  let thoughts=[];
  function load(){try{const raw=localStorage.getItem(LS);const t=raw?JSON.parse(raw):null;
    thoughts=(t&&Array.isArray(t))?t:[];}catch(e){thoughts=[];}}
  function persist(){try{localStorage.setItem(LS,JSON.stringify(thoughts));}catch(e){}}
  load();
  window.addEventListener('storage',e=>{if(e.key===LS){load();rebuildNodes();}});

  const state={activeCats:new Set(CAT_ORDER),sizeBy:'size',selectedId:null};

  const idHash=id=>{let h=0;for(let i=0;i<id.length;i++)h=(h*31+id.charCodeAt(i))>>>0;return h;};
  const idlePhase={};
  function phaseFor(id){
    if(!idlePhase[id]){const h=idHash(id);
      idlePhase[id]={px:(h%1000)/1000*6.283,py:((h>>10)%1000)/1000*6.283,
        fx:0.5+((h>>4)%100)/100*0.6,fy:0.42+((h>>7)%100)/100*0.55,amp:9+((h>>2)%100)/100*8};}
    return idlePhase[id];
  }

  /* ---------- graph nodes / edges ---------- */
  let nodes=[], edges=[];
  function moodOf(t,k){return (t.mood&&t.mood[k])||0;}
  function rebuildNodes(){
    const byId={};
    nodes=thoughts.map((t,i)=>{
      const l=(CATS[t.cat]&&CATS[t.cat].lobe)||{x:.5,y:.5};
      const a=Math.random()*6.2832;
      return {id:t.id,x:l.x+Math.cos(a)*0.05,y:l.y+Math.sin(a)*0.05,vx:0,vy:0,t};
    });
    const byIndex={};nodes.forEach((n,i)=>byIndex[n.id]=i);
    edges=[];
    // cluster edges: connect each node to its 2 nearest same-category peers
    CAT_ORDER.forEach(cat=>{
      const idx=nodes.map((n,i)=>i).filter(i=>nodes[i].t.cat===cat);
      idx.forEach(i=>{
        const others=idx.filter(j=>j!==i);
        others.slice(0,2).forEach(j=>{
          if(!edges.some(e=>(e.a===i&&e.b===j)||(e.a===j&&e.b===i)))
            edges.push({a:i,b:j,kind:'cluster'});
        });
      });
    });
    // stress edges: any two non-done thoughts both rated stress>=4, across categories
    const stressed=nodes.map((n,i)=>i).filter(i=>moodOf(nodes[i].t,'stress')>=4 && !nodes[i].t.done);
    for(let a=0;a<stressed.length;a++)for(let b=a+1;b<stressed.length;b++){
      edges.push({a:stressed[a],b:stressed[b],kind:'stress'});
    }
    // cross edges: every node reaches across to its nearest neighbor in a DIFFERENT
    // category, so the graph reads as one connected brain, not isolated clusters
    nodes.forEach((n,i)=>{
      const others=nodes.map((n2,j)=>j).filter(j=>j!==i&&nodes[j].t.cat!==n.t.cat);
      if(!others.length)return;
      others.sort((a,b)=>((nodes[a].x-n.x)**2+(nodes[a].y-n.y)**2)-((nodes[b].x-n.x)**2+(nodes[b].y-n.y)**2));
      const j=others[0];
      if(!edges.some(e=>(e.a===i&&e.b===j)||(e.a===j&&e.b===i)))
        edges.push({a:i,b:j,kind:'cross'});
    });
  }
  rebuildNodes();

  /* ---------- canvas ---------- */
  const stage=$('#stage'), canvas=$('#cv'), ctx=canvas.getContext('2d');
  const dpr=Math.min(window.devicePixelRatio||1,2);
  let W=1,H=1, imgT={ox:0,oy:0,dw:1,dh:1};
  function resize(){const w=stage.clientWidth||1,h=stage.clientHeight||1;W=w;H=h;
    canvas.width=Math.round(w*dpr);canvas.height=Math.round(h*dpr);ctx.setTransform(dpr,0,0,dpr,0,0);}
  resize();new ResizeObserver(resize).observe(stage);
  // Two decoders of the same clip: near the end of A we start B from 0 and
  // crossfade between them on the canvas, so the loop point never hard-cuts.
  const mkVid=()=>{const v=document.createElement('video');
    v.src='brain.mp4';v.muted=true;v.playsInline=true;v.preload='auto';return v;};
  const vidA=mkVid(), vidB=mkVid();
  let cur=vidA, nxt=vidB;
  const FADE=0.7;
  vidA.autoplay=true;
  cur.play().catch(()=>{});
  function swapVid(){const t=cur;cur=nxt;nxt=t;nxt.pause();try{nxt.currentTime=0;}catch(e){}
    if(!state.selectedId)cur.play().catch(()=>{});}
  vidA.addEventListener('ended',()=>{if(cur===vidA)swapVid();});
  vidB.addEventListener('ended',()=>{if(cur===vidB)swapVid();});
  function vidFade(){const d=cur.duration,t=cur.currentTime;
    if(!d)return 0;const rem=d-t;if(rem>=FADE)return 0;
    if(!state.selectedId&&nxt.paused){try{nxt.currentTime=0;}catch(e){}nxt.play().catch(()=>{});}
    return Math.min(1,Math.max(0,1-rem/FADE));}
  function vidPause(){cur.pause();nxt.pause();}
  function vidPlay(){cur.play().catch(()=>{});
    if(cur.duration&&cur.duration-cur.currentTime<FADE)nxt.play().catch(()=>{});}
  function computeImg(){const iw=cur.videoWidth||960,ih=cur.videoHeight||540;
    const s=Math.max(W/iw,H/ih),dw=iw*s,dh=ih*s;imgT={ox:(W-dw)/2,oy:(H-dh)/2,dw,dh};}
  const photoToScreen=(nx,ny)=>({x:imgT.ox+nx*imgT.dw,y:imgT.oy+ny*imgT.dh});

  const CLUSTER_CENTER={};
  CAT_ORDER.forEach(k=>CLUSTER_CENTER[k]=CATS[k].lobe);

  let dragId=null, dragging=false, hoverId=null, mx=0,my=0;
  let t0=performance.now(),lastTm=0;
  function nodeScreenPos(n){
    const ph=phaseFor(n.id), wt=state.selectedId?0:1;
    return {x:n.x*W+Math.sin(lastTm*ph.fx+ph.px)*ph.amp*wt, y:n.y*H+Math.cos(lastTm*ph.fy+ph.py)*ph.amp*wt};
  }

  function visible(n){return state.activeCats.has(n.t.cat)&&!n.t.done;}

  function step(){
    const active=nodes.filter(visible);
    // repulsion
    for(let i=0;i<active.length;i++){
      for(let j=i+1;j<active.length;j++){
        const a=active[i],b=active[j];
        let dx=(a.x-b.x)*W, dy=(a.y-b.y)*H;
        let d2=dx*dx+dy*dy; if(d2<1)d2=1;
        const d=Math.sqrt(d2);
        const force=1000/d2;
        const fx=(dx/d)*force, fy=(dy/d)*force;
        a.vx+=fx/W; a.vy+=fy/H; b.vx-=fx/W; b.vy-=fy/H;
      }
    }
    // cluster pull — hold each node near its category's anatomical lobe
    active.forEach(n=>{
      const c=CLUSTER_CENTER[n.t.cat]||{x:.5,y:.5};
      n.vx+=(c.x-n.x)*0.020; n.vy+=(c.y-n.y)*0.020;
    });
    // edge springs
    edges.forEach(e=>{
      const a=nodes[e.a],b=nodes[e.b];
      if(!visible(a)||!visible(b))return;
      const dx=(b.x-a.x)*W, dy=(b.y-a.y)*H;
      const d=Math.sqrt(dx*dx+dy*dy)||1;
      const target=e.kind==='stress'?55:e.kind==='cross'?150:60;
      const k=e.kind==='stress'?0.0022:e.kind==='cross'?0.0007:0.0014;
      const f=(d-target)*k;
      const fx=(dx/d)*f, fy=(dy/d)*f;
      a.vx+=fx/W; a.vy+=fy/H; b.vx-=fx/W; b.vy-=fy/H;
    });
    active.forEach(n=>{
      if(n===dragNode)return;
      n.vx*=0.82; n.vy*=0.82;
      n.x+=n.vx; n.y+=n.vy;
      n.x=Math.max(0.03,Math.min(0.97,n.x)); n.y=Math.max(0.03,Math.min(0.97,n.y));
    });
  }
  let dragNode=null;

  function nodeRadius(n){
    if(state.sizeBy==='size')return (SIZES[n.t.size||'m']||SIZES.m).r;
    const base=6;
    if(state.sizeBy==='prio')return base+n.t.prio*2.6;
    const v=moodOf(n.t,state.sizeBy);
    return base+v*2.4;
  }
  function nodeColor(n){
    if(state.sizeBy==='stress'||state.sizeBy==='joy'||state.sizeBy==='excitement'){
      const md=MOODS.find(m=>m.key===state.sizeBy);
      const v=moodOf(n.t,state.sizeBy);
      if(v>0)return hexRgb(md.hex);
    }
    return hexRgb(CATS[n.t.cat].hex);
  }

  function draw(now){
    const tm=((now||performance.now())-t0)/1000;
    lastTm=tm;
    ctx.clearRect(0,0,W,H);
    ctx.fillStyle='#03060f';ctx.fillRect(0,0,W,H);
    computeImg();
    if(cur.readyState>=2&&cur.videoWidth){ctx.globalAlpha=0.62;ctx.drawImage(cur,imgT.ox,imgT.oy,imgT.dw,imgT.dh);ctx.globalAlpha=1;}
    const fa=vidFade();
    if(fa>0&&nxt.readyState>=2&&nxt.videoWidth){
      ctx.globalAlpha=0.62*fa;
      ctx.drawImage(nxt,imgT.ox,imgT.oy,imgT.dw,imgT.dh);
      ctx.globalAlpha=1;
    }
    const pos=nodeScreenPos;
    // edges
    edges.forEach(e=>{
      const a=nodes[e.a],b=nodes[e.b];
      if(!visible(a)||!visible(b))return;
      const pa=pos(a),pb=pos(b);
      if(e.kind==='stress'){
        ctx.strokeStyle='rgba(255,90,60,0.5)';ctx.lineWidth=1.4;
        ctx.setLineDash([3,4]);
      }else if(e.kind==='cross'){
        ctx.strokeStyle='rgba(255,190,110,0.16)';ctx.lineWidth=1;
        ctx.setLineDash([]);
      }else{
        ctx.strokeStyle='rgba(255,255,255,0.1)';ctx.lineWidth=1;
        ctx.setLineDash([]);
      }
      ctx.beginPath();ctx.moveTo(pa.x,pa.y);ctx.lineTo(pb.x,pb.y);ctx.stroke();
    });
    ctx.setLineDash([]);
    // nodes
    nodes.forEach(n=>{
      if(!visible(n))return;
      const p=pos(n), r=nodeRadius(n), col=nodeColor(n);
      const isHov=hoverId===n.id||state.selectedId===n.id;
      const g=ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,r*2.4);
      g.addColorStop(0,rgba(col,0.5));g.addColorStop(1,rgba(col,0));
      ctx.fillStyle=g;ctx.beginPath();ctx.arc(p.x,p.y,r*2.4,0,6.2832);ctx.fill();
      ctx.fillStyle=n.t.cat==='worry'?'rgba(255,120,100,0.95)':rgba(col,0.95);
      ctx.beginPath();ctx.arc(p.x,p.y,r,0,6.2832);ctx.fill();
      if(isHov){ctx.lineWidth=2;ctx.strokeStyle='#fff';ctx.beginPath();ctx.arc(p.x,p.y,r+4,0,6.2832);ctx.stroke();}
      if(isHov){
        ctx.font="600 12px "+getComputedStyle(document.body).fontFamily;
        let txt=n.t.text;if(txt.length>34)txt=txt.slice(0,33)+'…';
        const tw=ctx.measureText(txt).width;
        let lx=p.x+r+10,ly=p.y-8;
        if(lx+tw+12>W)lx=p.x-r-tw-22;
        ctx.fillStyle='rgba(6,12,26,0.85)';
        ctx.beginPath();ctx.roundRect?ctx.roundRect(lx-6,ly-14,tw+12,20,6):ctx.rect(lx-6,ly-14,tw+12,20);ctx.fill();
        ctx.fillStyle='#fff';ctx.fillText(txt,lx,ly+1);
      }
    });
  }

  function loop(now){if(!state.selectedId)step();draw(now);requestAnimationFrame(loop);}

  /* ---------- pointer ---------- */
  function hit(qx,qy){
    for(let i=nodes.length-1;i>=0;i--){const n=nodes[i];if(!visible(n))continue;
      const p=nodeScreenPos(n),r=nodeRadius(n)+4;
      if((qx-p.x)**2+(qy-p.y)**2<r*r)return n;}
    return null;
  }
  canvas.addEventListener('mousemove',e=>{
    const r=canvas.getBoundingClientRect();mx=e.clientX-r.left;my=e.clientY-r.top;
    if(dragNode){dragNode.x=mx/W;dragNode.y=my/H;dragNode.vx=0;dragNode.vy=0;return;}
    const h=hit(mx,my);hoverId=h?h.id:null;canvas.style.cursor=h?'pointer':'default';
  });
  canvas.addEventListener('mouseleave',()=>{hoverId=null;});
  canvas.addEventListener('mousedown',e=>{
    const r=canvas.getBoundingClientRect();const px=e.clientX-r.left,py=e.clientY-r.top;
    const h=hit(px,py);if(h)dragNode=h;
  });
  window.addEventListener('mouseup',()=>{dragNode=null;});
  canvas.addEventListener('click',e=>{
    const r=canvas.getBoundingClientRect();const px=e.clientX-r.left,py=e.clientY-r.top;
    const h=hit(px,py);
    if(h){state.selectedId=h.id;vidPause();renderCard();}
    else deselect();
  });
  function deselect(){if(state.selectedId===null)return;state.selectedId=null;vidPlay();renderCard();}

  /* ---------- side panel ---------- */
  function renderLegend(){
    const el=$('#legend');
    el.innerHTML=CAT_ORDER.map(k=>'<span class="li"><span class="d" style="background:'+CATS[k].hex+';box-shadow:0 0 6px '+CATS[k].hex+'"></span>'+CATS[k].label+'</span>').join('')+
      '<span class="sep"></span><span class="li"><span class="d" style="background:#ffbe6e"></span>cross-category link</span>'+
      '<span class="li"><span class="d" style="background:#ff5a3c"></span>compounding stress link</span>';
  }
  function renderChips(){
    const el=$('#catChips');el.innerHTML='';
    CAT_ORDER.forEach(k=>{
      const b=document.createElement('button');b.className='chip'+(state.activeCats.has(k)?'':' off');
      b.innerHTML='<span class="d" style="background:'+CATS[k].hex+'"></span>'+CATS[k].label;
      b.onclick=()=>{if(state.activeCats.has(k))state.activeCats.delete(k);else state.activeCats.add(k);renderChips();renderStats();};
      el.appendChild(b);
    });
  }
  function renderModes(){
    const el=$('#moodModes');el.innerHTML='';
    [{key:'size',label:'Size'},{key:'prio',label:'Urgency'},...MOODS.map(m=>({key:m.key,label:m.label}))].forEach(m=>{
      const b=document.createElement('button');b.className='modebtn'+(state.sizeBy===m.key?' on':'');
      b.textContent=m.label;
      b.onclick=()=>{state.sizeBy=m.key;renderModes();};
      el.appendChild(b);
    });
  }
  function renderStats(){
    const open=thoughts.filter(t=>!t.done);
    const visCount=open.filter(t=>state.activeCats.has(t.cat)).length;
    const stressLinks=edges.filter(e=>e.kind==='stress'&&visible(nodes[e.a])&&visible(nodes[e.b])).length;
    $('#statsBox').innerHTML=
      '<div class="st">At a glance</div>'+
      '<div class="stat"><span>Visible thoughts</span><b>'+visCount+'</b></div>'+
      '<div class="stat"><span>Total open</span><b>'+open.length+'</b></div>'+
      '<div class="stat"><span>Compounding stress links</span><b>'+stressLinks+'</b></div>';
  }
  function moodHtml(t){
    const m=t.mood||{};
    return '<div class="moods">'+MOODS.map(md=>{
      const v=m[md.key]||0;
      const dots=[1,2,3,4,5].map(i=>'<button class="dt" data-k="'+md.key+'" data-v="'+i+'" style="'+
        (i<=v?'background:'+md.hex+';border-color:'+md.hex+';box-shadow:0 0 6px '+md.hex+'66':'')+'"></button>').join('');
      return '<div class="mrow"><span class="ml">'+md.label+'</span><span class="dots">'+dots+'</span></div>';
    }).join('')+'</div>';
  }
  function setMood(id,key,val){
    const t=thoughts.find(x=>x.id===id);if(!t)return;
    if(!t.mood)t.mood={joy:0,stress:0,excitement:0};
    t.mood[key]=t.mood[key]===val?0:val;
    persist();rebuildNodes();renderCard();renderStats();
  }
  function renderCard(){
    const old=$('#stage .card');if(old)old.remove();
    if(!state.selectedId)return;
    const t=thoughts.find(x=>x.id===state.selectedId);if(!t)return;
    const n=nodes.find(nn=>nn.id===t.id);
    const hex=CATS[t.cat].hex;
    const p=n?nodeScreenPos(n):{x:W/2,y:H/2};
    const left=Math.max(12,Math.min((W||600)-296,p.x+22));
    const top=Math.max(12,Math.min(Math.max(12,(H||400)-340),p.y-20));
    const card=document.createElement('div');card.className='card';card.style.left=left+'px';card.style.top=top+'px';
    card.innerHTML=
      '<div class="row"><span class="dot" style="background:'+hex+';box-shadow:0 0 10px '+hex+'"></span>'+
      '<span class="lab" style="color:'+hex+'">'+esc(CATS[t.cat].label)+'</span>'+
      '<button class="x">×</button></div>'+
      '<div class="tx">'+esc(t.text)+'</div>'+
      '<div class="meta">Urgency P'+t.prio+(t.done?' · done':'')+'</div>'+
      moodHtml(t)+
      '<div class="link">Open in Brain dump to edit or clear →</div>';
    card.querySelector('.x').onclick=()=>deselect();
    card.querySelectorAll('.dt').forEach(b=>{b.onclick=()=>setMood(t.id,b.dataset.k,+b.dataset.v);});
    stage.appendChild(card);
  }

  renderLegend();renderChips();renderModes();renderStats();
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
